<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Video Gallery</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; text-align: center; }
        h1 { margin-top: 20px; }
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
        .video-container { background: #fff; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        video { display: block; max-width: 300px; height: auto; }
        p { margin: 5px 0 0 0; font-size: 14px; }
    </style>
</head>
<body>
    <h1>My Video Gallery</h1>
    <div class="gallery" id="gallery"></div>

    <script>
       
        const videos = [
            "CannonLauncher.mp4",
            "ConstantFeedandKill.mp4"
            
        ];

        const gallery = document.getElementById("gallery");

        videos.forEach(video => {
            const container = document.createElement("div");
            container.className = "video-container";

            const vid = document.createElement("video");
            vid.src = video;
            vid.controls = true;

            const caption = document.createElement("p");
            caption.innerText = video;

            container.appendChild(vid);
            container.appendChild(caption);
            gallery.appendChild(container);
        });
    </script>
</body>
</html>
